<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>p5.js Sketch Gallery</title>

  <link rel="stylesheet" type="text/css" href="style.css">

  <script src="libraries/p5.min.js"></script>
  <script src="libraries/p5.sound.min.js"></script>
</head>

<body>
  <div class="gallery-container">
    <div class="sketch-list">
      <div class="sketch-header">
        <h1>p5.js Sketch Gallery</h1>
        <p class="subtitle">Interactive creative coding examples</p>
      </div>
      
      <div class="sketch-category">
        <h3>Beginner</h3>
        <div class="sketch-grid">
          <button class="sketch-btn" data-sketch="bouncing-balls.js" data-desc="Physics demo with gravity, collision, and mouse interaction">Bouncing Balls</button>
          <button class="sketch-btn" data-sketch="particle-trail.js" data-desc="Mouse-following particles with fade effect">Particle Trail</button>
          <button class="sketch-btn" data-sketch="sine-waves.js" data-desc="Animated waves with color gradients">Sine Waves</button>
          <button class="sketch-btn" data-sketch="interactive-grid.js" data-desc="Grid of cells that change on hover/click">Interactive Grid</button>
        </div>
      </div>
      
      <div class="sketch-category">
        <h3>Generative Art</h3>
        <div class="sketch-grid">
          <button class="sketch-btn" data-sketch="flow-field.js" data-desc="Perlin noise-driven particle flow">Flow Field</button>
          <button class="sketch-btn" data-sketch="lissajous-curves.js" data-desc="Complex harmonic motion patterns">Lissajous Curves</button>
          <button class="sketch-btn" data-sketch="spirograph.js" data-desc="Geometric spirograph with variable parameters">Spirograph</button>
          <button class="sketch-btn" data-sketch="voronoi-diagram.js" data-desc="Interactive voronoi cell visualization">Voronoi Diagram</button>
        </div>
      </div>
      
      <div class="sketch-category">
        <h3>Fractals</h3>
        <div class="sketch-grid">
          <button class="sketch-btn" data-sketch="fractal-tree.js" data-desc="Recursive branching tree with wind effect">Fractal Tree</button>
          <button class="sketch-btn" data-sketch="sierpinski-triangle.js" data-desc="Classic fractal triangle">Sierpinski Triangle</button>
          <button class="sketch-btn" data-sketch="mandelbrot-explorer.js" data-desc="Zoomable mandelbrot set">Mandelbrot Explorer</button>
        </div>
      </div>
      
      <div class="sketch-category">
        <h3>Games</h3>
        <div class="sketch-grid">
          <button class="sketch-btn" data-sketch="pong-clone.js" data-desc="Classic paddle game">Pong Clone</button>
          <button class="sketch-btn" data-sketch="snake-game.js" data-desc="Classic snake mechanics">Snake Game</button>
        </div>
      </div>
      
      <div class="sketch-category">
        <h3>Interactive Tools</h3>
        <div class="sketch-grid">
          <button class="sketch-btn" data-sketch="drawing-tool.js" data-desc="Brush with size/color controls">Drawing Tool</button>
          <button class="sketch-btn" data-sketch="game-of-life.js" data-desc="Cellular automaton simulation">Game of Life</button>
        </div>
      </div>
      
      <div class="sketch-category">
        <h3>3D & Advanced</h3>
        <div class="sketch-grid">
          <button class="sketch-btn" data-sketch="rotating-cube.js" data-desc="3D cube with lighting">Rotating Cube</button>
          <button class="sketch-btn" data-sketch="terrain-generator.js" data-desc="3D terrain using noise">Terrain Generator</button>
          <button class="sketch-btn" data-sketch="particle-fountain.js" data-desc="3D particle fountain">Particle Fountain</button>
        </div>
      </div>
    </div>
    <div class="canvas-container">
      <div class="canvas-header">
        <h2 id="current-sketch-name">Bouncing Balls</h2>
        <p id="current-sketch-desc">Physics demo with gravity, collision, and mouse interaction</p>
      </div>
      <div id="sketch-container"></div>
      <div class="canvas-footer">
        <p class="tip">💡 Tip: Press SPACE in most sketches to reset or pause</p>
      </div>
    </div>
  </div>
  <script>
    let currentP5Instance = null;
    
    document.querySelectorAll('.sketch-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const sketchFile = btn.dataset.sketch;
        const sketchDesc = btn.dataset.desc || '';
        loadSketch(sketchFile, sketchDesc);
        
        document.querySelectorAll('.sketch-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      });
    });
    
    function loadSketch(sketchFile, description) {
      // Remove existing p5 instance
      if (currentP5Instance) {
        currentP5Instance.remove();
        currentP5Instance = null;
      }
      
      // Remove existing canvas
      const existingCanvas = document.querySelector('canvas');
      if (existingCanvas) {
        existingCanvas.remove();
      }
      
      // Update UI
      document.getElementById('current-sketch-name').textContent = sketchFile.replace('.js', '').replace(/-/g, ' ');
      document.getElementById('current-sketch-desc').textContent = description || '';
      
      // Load and execute sketch in instance mode
      fetch(sketchFile)
        .then(response => response.text())
        .then(code => {
          // Clean up global p5 functions
          if (typeof window.setup !== 'undefined') delete window.setup;
          if (typeof window.draw !== 'undefined') delete window.draw;
          if (typeof window.windowResized !== 'undefined') delete window.windowResized;
          if (typeof window.keyPressed !== 'undefined') delete window.keyPressed;
          if (typeof window.mousePressed !== 'undefined') delete window.mousePressed;
          if (typeof window.mouseMoved !== 'undefined') delete window.mouseMoved;
          if (typeof window.mouseWheel !== 'undefined') delete window.mouseWheel;
          
          // Execute the sketch code (defines global functions)
          eval(code);
          
          // Create new p5 instance with the global functions
          currentP5Instance = new p5((p) => {
            if (typeof window.setup === 'function') {
              const originalSetup = window.setup;
              p.setup = () => {
                p.createCanvas(p.windowWidth, p.windowHeight);
                originalSetup();
              };
            }
            if (typeof window.draw === 'function') p.draw = window.draw;
            if (typeof window.windowResized === 'function') p.windowResized = window.windowResized;
            if (typeof window.keyPressed === 'function') p.keyPressed = window.keyPressed;
            if (typeof window.mousePressed === 'function') p.mousePressed = window.mousePressed;
            if (typeof window.mouseMoved === 'function') p.mouseMoved = window.mouseMoved;
            if (typeof window.mouseWheel === 'function') p.mouseWheel = window.mouseWheel;
          }, document.getElementById('sketch-container'));
        })
        .catch(err => console.error('Error loading sketch:', err));
    }
    
    // Load first sketch on page load
    document.querySelector('[data-sketch="bouncing-balls.js"]').classList.add('active');
    loadSketch('bouncing-balls.js', document.querySelector('[data-sketch="bouncing-balls.js"]').dataset.desc);
  </script>
</body>

</html>
